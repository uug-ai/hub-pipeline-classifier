name: Create a new release
on:
  release:
    types: [created]

jobs:
  release:
    uses: uug-ai/workflows/.github/workflows/release-create.yml@main
    with:
      organization: uug-ai
      project: ${{ github.event.repository.name }}
      tag: ${{ github.event.release.tag_name }}
      docker_context: "."
      runner_matrix: >-
        [
          {"architecture":"amd64","runner":"ubuntu-24.04"},
          {"architecture":"arm64","runner":"github-runner-set-arm64"}
        ]
      create_gitops_pr: true
      gitops_repo: "uug-ai/gitops"
      gitops_file: "environments/staging/kerberos-hub/hub-pipeline-classifier.yaml"
      gitops_key: ".spec.template.spec.containers[0].image"
      gitops_value: "uug-ai/hub-pipeline-classifier:${{ github.event.release.tag_name }}"
    secrets: inherit